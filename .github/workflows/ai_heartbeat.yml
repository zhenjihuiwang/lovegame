name: AI Heartbeat

on:
  schedule:
    # 每15分钟运行一次。
    # 注意：GitHub Actions 的最小间隔通常是5分钟，
    # 实际执行时间可能会有几分钟的延迟。
    - cron: '0,15,30,45 * * * *'
  
  # 也可以手动触发，方便调试
  workflow_dispatch:

jobs:
  trigger-vercel-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel AI Heartbeat
        run: |
          # 这是你的 Vercel Serverless Function 的完整 URL
          # 我已经帮你替换成了你的实际网址
          VERCEL_FUNCTION_URL="https://mumulovegame.vercel.app/api/heartbeat" 
          
          # 发送一个 HTTP GET 请求来触发你的函数
          # 使用 curl -f 来确保如果请求失败（例如404或500），Action 会失败
          curl -f $VERCEL_FUNCTION_URL
